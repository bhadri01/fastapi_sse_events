# Nginx Configuration for 100K Users
# Place this in /etc/nginx/conf.d/sse-production.conf

upstream fastapi_sse_backend {
    # IP hash for sticky sessions (critical for SSE)
    ip_hash;
    
    # 10 FastAPI instances for 100K users
    server fastapi-1:8000 max_fails=3 fail_timeout=30s;
    server fastapi-2:8000 max_fails=3 fail_timeout=30s;
    server fastapi-3:8000 max_fails=3 fail_timeout=30s;
    server fastapi-4:8000 max_fails=3 fail_timeout=30s;
    server fastapi-5:8000 max_fails=3 fail_timeout=30s;
    server fastapi-6:8000 max_fails=3 fail_timeout=30s;
    server fastapi-7:8000 max_fails=3 fail_timeout=30s;
    server fastapi-8:8000 max_fails=3 fail_timeout=30s;
    server fastapi-9:8000 max_fails=3 fail_timeout=30s;
    server fastapi-10:8000 max_fails=3 fail_timeout=30s;
    
    # Health check configuration
    check interval=5000 rise=2 fall=3 timeout=3000 type=http;
    check_http_send "HEAD /health/ready HTTP/1.0\r\n\r\n";
    check_http_expect_alive http_2xx http_3xx;
}

server {
    listen 80;
    server_name api.your-domain.com;
    
    # Increase buffer sizes for performance
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    
    # Health check endpoint (for external monitoring)
    location /health {
        access_log off;
        proxy_pass http://fastapi_sse_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    # Metrics endpoint (for Prometheus)
    location /metrics {
        access_log off;
        proxy_pass http://fastapi_sse_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SSE endpoint - SPECIAL CONFIGURATION
    location /events {
        # Logging
        access_log /var/log/nginx/sse_access.log;
        error_log /var/log/nginx/sse_error.log;
        
        # Proxy to backend
        proxy_pass http://fastapi_sse_backend;
        proxy_http_version 1.1;
        
        # Keep connection open
        proxy_set_header Connection '';
        
        # Critical: Disable all buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        
        # Timeouts for long-lived connections (24 hours)
        proxy_read_timeout 86400s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 86400s;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable chunked transfer encoding
        chunked_transfer_encoding on;
        
        # Disable Nginx buffering (critical for SSE)
        add_header X-Accel-Buffering no;
        
        # CORS headers (if needed)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        
        # Handle preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Regular API endpoints
    location / {
        proxy_pass http://fastapi_sse_backend;
        proxy_http_version 1.1;
        
        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable connection reuse
        proxy_set_header Connection "keep-alive";
    }
}

# HTTPS configuration (production)
server {
    listen 443 ssl http2;
    server_name api.your-domain.com;
    
    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Include same location blocks as HTTP server above
    # ... (copy locations from above)
}
